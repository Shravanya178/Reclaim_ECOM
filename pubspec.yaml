name: reclaim
description: "A mobile app for sustainable material reuse in academic institutions"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Backend Services
  supabase_flutter: ^2.3.4
  
  # UI & Navigation
  go_router: ^13.0.0
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  
  # Camera & Image Processing
  camera: ^0.10.5+8
  image_picker: ^1.0.4
  image: ^4.1.3
  
  # AI/ML
  tflite_flutter: ^0.10.4
  google_generative_ai: ^0.4.3
  
  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Utilities
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  permission_handler: ^11.0.1
  uuid: ^4.2.1
  intl: ^0.18.1
  path_provider: ^2.1.1
  url_launcher: ^6.2.2
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0
  
  # PWA & Web Support
  flutter_web_plugins:
    sdk: flutter
  url_strategy: ^0.2.0
  universal_html: ^2.2.4
  universal_io: ^2.2.2
  
  # Payment Gateway
  razorpay_flutter: ^1.3.5
  
  # E-commerce UI Components
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2
  
  # Charts & Analytics
  fl_chart: ^0.65.0
  
  # PDF Generation (invoices)
  pdf: ^3.10.7
  printing: ^5.11.1
  
  # Excel Export
  excel: ^4.0.1
  
  # Enhanced Image Handling
  flutter_image_compress: ^2.1.0
  
  # Icons & Assets
  cupertino_icons: ^1.0.2
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code Generation
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8
  json_annotation: ^4.8.1
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  freezed_annotation: ^2.4.1
  
  # Linting
  flutter_lints: ^3.0.0
  
  # Testing
  mockito: ^5.4.2
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
   
    - assets/models/
    - images/

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21